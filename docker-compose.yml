services:
  traefik:
    image: traefik:v3.1
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080" # Traefik dashboard (dev only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - edge

  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:?Set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:?Set POSTGRES_DB in .env}
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=PathPrefix(`/api`)
      - traefik.http.routers.backend.entrypoints=web
      - traefik.http.routers.backend.priority=100
      - traefik.http.middlewares.backend-stripprefix.stripprefix.prefixes=/api
      - traefik.http.routers.backend.middlewares=backend-stripprefix,security-headers@file
      - traefik.http.services.backend.loadbalancer.server.port=8000
    depends_on:
      - db
    networks:
      - edge
      - internal

  frontend:
    build:
      context: ./frontend
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=PathPrefix(`/`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.routers.frontend.priority=10
      - traefik.http.routers.frontend.middlewares=security-headers@file
      - traefik.http.services.frontend.loadbalancer.server.port=80
    networks:
      - edge

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:?Set POSTGRES_DB in .env}
      - POSTGRES_USER=${POSTGRES_USER:?Set POSTGRES_USER in .env}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  # no this is dev only and shouldnt be exposed!!! if you are not a dev just use make up
  db-forward:
    image: alpine/socat
    command: TCP-LISTEN:15432,fork,reuseaddr TCP:db:5432
    ports:
      - "127.0.0.1:15432:15432"
    networks:
      - internal
      - edge
    depends_on:
      - db
    profiles: [ "dev" ]

volumes:
  pgdata:

networks:
  edge:
  internal:
    internal: true

